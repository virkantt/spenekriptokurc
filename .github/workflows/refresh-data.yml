name: Refresh data and deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-and-public-market-data
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install updater dependency
        run: python -m pip install --disable-pip-version-check "requests>=2.32,<3"

      - name: Refresh market snapshots and news
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python scripts/update_data.py

      - name: Commit refreshed public JSON
        shell: bash
        run: |
          if git diff --quiet -- data/market-data.json data/news.json; then
            echo "No data changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/market-data.json data/news.json
            git commit -m "chore: refresh public market data and news"
            git push || echo "::warning::Could not push refreshed JSON; this deployment still contains the fresh files."
          fi

      - name: Prepare static site artifact
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          touch _site/.nojekyll
          cp -R data _site/data

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
